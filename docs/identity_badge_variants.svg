<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#ffd86a" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#273142" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#080b10" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff0a8"/>
      <stop offset="0.48" stop-color="#f1c75c"/>
      <stop offset="1" stop-color="#a36b23"/>
    </linearGradient>
    <linearGradient id="avatarA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f64d44"/>
      <stop offset="1" stop-color="#912717"/>
    </linearGradient>
    <linearGradient id="avatarB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3e91ff"/>
      <stop offset="1" stop-color="#274073"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="0" cy="0" r="42"/>
    </clipPath>
    <style>
      .page-title { font: 800 34px "Segoe UI", Arial, sans-serif; fill: #f5f6fa; }
      .label { font: 800 24px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .sub { font: 700 15px "Segoe UI", Arial, sans-serif; fill: rgba(255,255,255,0.62); }
      .name { font: 900 25px "Segoe UI", Arial, sans-serif; fill: #ffe98d; }
      .level { font: 850 13px "Segoe UI", Arial, sans-serif; fill: rgba(255,255,255,0.76); }
      .caption { font: 750 17px "Segoe UI", Arial, sans-serif; fill: rgba(255,255,255,0.76); }
      .muted { fill: rgba(255,255,255,0.48); }
    </style>
  </defs>

  <rect width="1500" height="980" fill="#071225"/>
  <rect width="1500" height="980" fill="url(#bg)" opacity="0.2"/>
  <text x="70" y="70" class="page-title">Identity Badge Design Variants</text>
  <text x="70" y="103" class="sub">Profile photo + nickname + future level label. Choose a direction, then it can be implemented in the overlay CSS.</text>

  <!-- 1 -->
  <g transform="translate(110 170)">
    <text x="0" y="-34" class="caption">A. Stacked capsule</text>
    <g filter="url(#shadow)">
      <rect x="18" y="26" width="154" height="102" rx="36" fill="url(#glass)" stroke="#f4d77a" stroke-width="2"/>
      <circle cx="95" cy="36" r="48" fill="#12161e" stroke="url(#gold)" stroke-width="4"/>
      <g transform="translate(95 36)" clip-path="url(#circleClip)">
        <rect x="-48" y="-48" width="96" height="96" fill="url(#avatarA)"/>
        <circle cx="-9" cy="16" r="23" fill="#ffd6a4"/>
        <rect x="-42" y="-38" width="84" height="31" rx="11" fill="#d71920"/>
        <rect x="-10" y="-48" width="20" height="68" fill="#ffcc66" opacity="0.6"/>
      </g>
      <rect x="39" y="70" width="112" height="37" rx="18" fill="#0a0d12" stroke="#ffe58a" stroke-width="1.5"/>
      <text x="95" y="96" class="name" text-anchor="middle">NA</text>
      <rect x="66" y="112" width="58" height="22" rx="11" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.12)"/>
      <text x="95" y="128" class="level" text-anchor="middle">Lv. 12</text>
    </g>
  </g>

  <!-- 2 -->
  <g transform="translate(390 170)">
    <text x="0" y="-34" class="caption">B. Side tag</text>
    <g filter="url(#shadow)">
      <rect x="34" y="42" width="206" height="76" rx="38" fill="url(#glass)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
      <rect x="109" y="58" width="112" height="42" rx="18" fill="#0a0d12" stroke="#f1c75c" stroke-width="2"/>
      <text x="165" y="87" class="name" text-anchor="middle">YE DG</text>
      <rect x="139" y="101" width="54" height="21" rx="10" fill="rgba(255,255,255,0.08)"/>
      <text x="166" y="116" class="level" text-anchor="middle">Lv. 8</text>
      <circle cx="70" cy="80" r="50" fill="#101722" stroke="url(#gold)" stroke-width="4"/>
      <g transform="translate(70 80)" clip-path="url(#circleClip)">
        <rect x="-48" y="-48" width="96" height="96" fill="url(#avatarB)"/>
        <circle cx="-4" cy="14" r="25" fill="#e8b384"/>
        <rect x="-45" y="-42" width="90" height="30" rx="14" fill="#1f5c9f"/>
      </g>
    </g>
  </g>

  <!-- 3 -->
  <g transform="translate(740 170)">
    <text x="0" y="-34" class="caption">C. Photo card</text>
    <g filter="url(#shadow)">
      <rect x="36" y="12" width="138" height="156" rx="31" fill="url(#glass)" stroke="#f0d36e" stroke-width="2"/>
      <rect x="50" y="27" width="110" height="86" rx="24" fill="#111720" stroke="rgba(255,255,255,0.42)" stroke-width="3"/>
      <g transform="translate(105 70)" clip-path="url(#circleClip)">
        <rect x="-55" y="-50" width="110" height="98" fill="#7643c7"/>
        <circle cx="0" cy="14" r="25" fill="#f1bf91"/>
        <rect x="-40" y="-37" width="80" height="30" rx="14" fill="#472e90"/>
      </g>
      <rect x="54" y="105" width="102" height="39" rx="19" fill="#090c12" stroke="#ffe58a" stroke-width="1.5"/>
      <text x="105" y="132" class="name" text-anchor="middle">Test</text>
      <text x="105" y="156" class="level" text-anchor="middle">Lv. 3</text>
    </g>
  </g>

  <!-- 4 -->
  <g transform="translate(110 500)">
    <text x="0" y="-34" class="caption">D. Minimal no-photo ready</text>
    <g filter="url(#shadow)">
      <rect x="14" y="45" width="186" height="70" rx="24" fill="rgba(8,11,16,0.86)" stroke="#e7c75c" stroke-width="2"/>
      <rect x="28" y="58" width="52" height="45" rx="17" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.13)"/>
      <text x="54" y="89" class="label" text-anchor="middle">TE</text>
      <text x="95" y="79" class="name">Test</text>
      <text x="96" y="99" class="level">Lv. 2</text>
      <circle cx="194" cy="48" r="12" fill="#57d989" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    </g>
  </g>

  <!-- 5 -->
  <g transform="translate(390 500)">
    <text x="0" y="-34" class="caption">E. Crown host badge</text>
    <g filter="url(#shadow)">
      <rect x="29" y="32" width="172" height="116" rx="34" fill="url(#glass)" stroke="#f9df85" stroke-width="2.4" filter="url(#softGlow)"/>
      <path d="M74 35 L86 -4 L113 26 L140 -4 L152 35 Z" fill="#ffd84f" stroke="#ffed9f" stroke-width="2"/>
      <circle cx="115" cy="66" r="48" fill="#101722" stroke="url(#gold)" stroke-width="4"/>
      <g transform="translate(115 66)" clip-path="url(#circleClip)">
        <rect x="-48" y="-48" width="96" height="96" fill="url(#avatarA)"/>
        <circle cx="-3" cy="18" r="24" fill="#f5c091"/>
        <rect x="-42" y="-39" width="84" height="31" rx="12" fill="#c9191e"/>
      </g>
      <rect x="62" y="102" width="106" height="37" rx="18" fill="#090c12" stroke="#ffe58a" stroke-width="1.5"/>
      <text x="115" y="128" class="name" text-anchor="middle">NA</text>
    </g>
  </g>

  <!-- 6 -->
  <g transform="translate(740 500)">
    <text x="0" y="-34" class="caption">F. Compact streamer tag</text>
    <g filter="url(#shadow)">
      <path d="M42 42 H190 Q222 42 222 74 V101 Q222 133 190 133 H42 Q10 133 10 101 V74 Q10 42 42 42 Z" fill="rgba(8,11,16,0.88)" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
      <path d="M42 42 H190 Q222 42 222 74 V76 H10 V74 Q10 42 42 42 Z" fill="rgba(255,229,138,0.12)"/>
      <circle cx="60" cy="87" r="41" fill="#101722" stroke="#f1c75c" stroke-width="3"/>
      <g transform="translate(60 87)" clip-path="url(#circleClip)">
        <rect x="-45" y="-45" width="90" height="90" fill="#315b37"/>
        <circle cx="1" cy="12" r="24" fill="#d7aa7f"/>
        <rect x="-38" y="-36" width="76" height="28" rx="14" fill="#314a29"/>
      </g>
      <text x="113" y="85" class="name">닉네임</text>
      <text x="114" y="108" class="level">Lv. 25 · Member</text>
      <circle cx="207" cy="48" r="12" fill="#57d989" stroke="rgba(255,255,255,0.34)" stroke-width="2"/>
    </g>
  </g>

  <text x="70" y="884" class="sub">Recommendation: E for NA host, B/F for normal users, D for users without profile photos.</text>
  <text x="70" y="914" class="sub">The final overlay can mix these rules: host crown, participant glow border, optional level row, and no-photo compact fallback.</text>
</svg>
