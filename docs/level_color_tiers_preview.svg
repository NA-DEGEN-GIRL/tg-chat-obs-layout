  <g transform="translate(72 330)">
    <g transform="translate(0 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="315" height="96" rx="30" fill="#080b10" stroke="#b08cff" stroke-opacity="0.3"/>
      <rect x="0" y="0" width="315" height="96" rx="30" fill="#b08cff" opacity="0.07"/>
      <circle cx="47" cy="48" r="30" fill="#2a2146" stroke="#b08cff" stroke-width="2"/>
      <text x="47" y="57" text-anchor="middle" class="name">VI</text>
      <text x="94" y="42" class="name">Violet User</text>
      <rect x="94" y="55" width="79" height="25" rx="12" fill="#b08cff" opacity="0.1" stroke="#b08cff" stroke-opacity="0.5"/>
      <text x="134" y="73" class="level" text-anchor="middle" fill="#b08cff">Lv. 42</text>
      <text x="196" y="73" class="range">35-49</text>
    </g>
    <g transform="translate(360 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="315" height="96" rx="30" fill="#080b10" stroke="#ffd86a" stroke-opacity="0.36"/>
      <rect x="0" y="0" width="315" height="96" rx="30" fill="#ffd86a" opacity="0.08"/>
      <circle cx="47" cy="48" r="30" fill="#443416" stroke="#ffd86a" stroke-width="2"/>
      <text x="47" y="57" text-anchor="middle" class="name">GO</text>
      <text x="94" y="42" class="name">Gold User</text>
      <rect x="94" y="55" width="79" height="25" rx="12" fill="#ffd86a" opacity="0.1" stroke="#ffd86a" stroke-opacity="0.5"/>
      <text x="134" y="73" class="level" text-anchor="middle" fill="#ffd86a">Lv. 61</text>
      <text x="196" y="73" class="range">50-69</text>
    </g>
    <g transform="translate(720 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="315" height="96" rx="30" fill="#080b10" stroke="#ff7a74" stroke-opacity="0.4"/>
      <rect x="0" y="0" width="315" height="96" rx="30" fill="#ff7a74" opacity="0.08"/>
      <circle cx="47" cy="48" r="30" fill="#461f21" stroke="#ff7a74" stroke-width="2"/>
      <text x="47" y="57" text-anchor="middle" class="name">CR</text>
      <text x="94" y="42" class="name">Crimson User</text>
      <rect x="94" y="55" width="79" height="25" rx="12" fill="#ff7a74" opacity="0.1" stroke="#ff7a74" stroke-opacity="0.5"/>
      <text x="134" y="73" class="level" text-anchor="middle" fill="#ff7a74">Lv. 78</text>
      <text x="196" y="73" class="range">70-89</text>
    </g>
  </g>

  <g transform="translate(72 520)" filter="url(#shadow)">
    <rect x="0" y="0" width="420" height="118" rx="34" fill="#080b10" stroke="#ff4b5f" stroke-opacity="0.62"/>
    <rect x="0" y="0" width="420" height="118" rx="34" fill="#ff4b5f" opacity="0.08"/>
    <circle cx="60" cy="59" r="38" fill="#4a171f" stroke="#ffd86a" stroke-width="3"/>
    <text x="60" y="71" text-anchor="middle" class="name">NA</text>
    <text x="118" y="50" class="name" fill="#ffe889">NA</text>
    <rect x="118" y="65" width="84" height="28" rx="14" fill="#ff4b5f" opacity="0.12" stroke="#ff4b5f" stroke-opacity="0.65"/>
    <text x="160" y="85" class="level" text-anchor="middle" fill="#ff4b5f">Lv. 99</text>
    <text x="224" y="85" class="range">Host / Mythic 90-99</text>
