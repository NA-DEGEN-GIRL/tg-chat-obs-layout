<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <style>
      .title { font: 900 38px "Segoe UI", Arial, sans-serif; fill: #f8f8fb; }
      .sub { font: 700 17px "Segoe UI", Arial, sans-serif; fill: rgba(255,255,255,0.66); }
      .name { font: 900 24px "Segoe UI", Arial, sans-serif; fill: #f4f7ff; }
      .level { font: 850 15px "Segoe UI", Arial, sans-serif; }
      .range { font: 750 14px "Segoe UI", Arial, sans-serif; fill: rgba(255,255,255,0.55); }
    </style>
  </defs>

  <rect width="1500" height="900" fill="#071225"/>
  <radialGradient id="bg" cx="50%" cy="35%" r="70%">
    <stop offset="0" stop-color="#17263d"/>
    <stop offset="1" stop-color="#071225"/>
  </radialGradient>
  <rect width="1500" height="900" fill="url(#bg)" opacity="0.78"/>

  <text x="70" y="76" class="title">Level Color Tier Preview</text>
  <text x="70" y="110" class="sub">F-style identity card without streamer tag. Host uses Lv. 99 with red mythic glow.</text>

  <g transform="translate(72 170)">
    <g transform="translate(0 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="315" height="96" rx="30" fill="#080b10" stroke="#b7c6d8" stroke-opacity="0.22"/>
      <rect x="0" y="0" width="315" height="96" rx="30" fill="#b7c6d8" opacity="0.055"/>
      <rect x="18" y="20" width="56" height="56" rx="20" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="46" y="56" text-anchor="middle" class="name">S</text>
      <text x="94" y="42" class="name">Seed User</text>
      <rect x="94" y="55" width="72" height="25" rx="12" fill="#b7c6d8" opacity="0.09" stroke="#b7c6d8" stroke-opacity="0.48"/>
      <text x="130" y="73" class="level" text-anchor="middle" fill="#b7c6d8">Lv. 7</text>
      <text x="190" y="73" class="range">1-9</text>
    </g>
    <g transform="translate(360 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="315" height="96" rx="30" fill="#080b10" stroke="#78d98e" stroke-opacity="0.24"/>
      <rect x="0" y="0" width="315" height="96" rx="30" fill="#78d98e" opacity="0.06"/>
      <circle cx="47" cy="48" r="30" fill="#1d2b21" stroke="#78d98e" stroke-width="2"/>
      <text x="47" y="57" text-anchor="middle" class="name">SP</text>
      <text x="94" y="42" class="name">Sprout User</text>
      <rect x="94" y="55" width="79" height="25" rx="12" fill="#78d98e" opacity="0.1" stroke="#78d98e" stroke-opacity="0.5"/>
      <text x="134" y="73" class="level" text-anchor="middle" fill="#78d98e">Lv. 14</text>
      <text x="196" y="73" class="range">10-19</text>
    </g>
    <g transform="translate(720 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="315" height="96" rx="30" fill="#080b10" stroke="#60d4ff" stroke-opacity="0.28"/>
      <rect x="0" y="0" width="315" height="96" rx="30" fill="#60d4ff" opacity="0.065"/>
      <circle cx="47" cy="48" r="30" fill="#163146" stroke="#60d4ff" stroke-width="2"/>
      <text x="47" y="57" text-anchor="middle" class="name">AQ</text>
      <text x="94" y="42" class="name">Aqua User</text>
      <rect x="94" y="55" width="79" height="25" rx="12" fill="#60d4ff" opacity="0.1" stroke="#60d4ff" stroke-opacity="0.5"/>
      <text x="134" y="73" class="level" text-anchor="middle" fill="#60d4ff">Lv. 28</text>
      <text x="196" y="73" class="range">20-34</text>
    </g>
