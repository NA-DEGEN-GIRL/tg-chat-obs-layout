<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Level FX Lab</title>
  <link rel="stylesheet" href="/static/level_fx_lab.css">
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="label">
    <div class="name">NA</div>
    <div id="level">Lv. 1</div>
  </div>
  <div id="hud">
    <div class="title">Level FX Lab</div>
    <div class="row">
      <button id="up-beam" type="button">level up: beam</button>
      <button id="up-rings" type="button">level up: rings</button>
      <button id="down-dust" type="button">level down</button>
    </div>
    <div class="row">
      <button id="fire-rocket" type="button">fire: rocket</button>
      <button id="fire-fountain" type="button">fire: fountain</button>
      <button id="fire-ring" type="button">fire: ring burst</button>
      <button id="fire-orbit" type="button">fire: orbit pop</button>
      <button id="fire-orbit-finale" type="button">fire: orbit finale</button>
      <span id="fire-sound-state" class="hint">sound idle</span>
    </div>
    <div class="row">
      <button id="cheer-default" type="button">cheer: 5 sec</button>
      <button id="cheer-custom" type="button">cheer sec</button>
      <label>duration
        <input id="cheer-sec" type="number" min="1" max="600" step="1" value="5">
        sec
      </label>
      <button id="cheer-off" type="button">cheer off</button>
    </div>
    <div class="row command-row">
      <label>command
        <input id="cheer-command" type="text" value="/cheer 5">
      </label>
      <button id="cheer-command-run" type="button">run</button>
      <span class="hint">/cheer, /cheer 30, /cheer off</span>
    </div>
    <div class="row">
      <button id="place-claw" type="button">place: claw grab</button>
      <button class="scale-preset active" type="button" data-scale="1">normal</button>
      <button class="scale-preset" type="button" data-scale="0.55">mini</button>
      <button class="scale-preset" type="button" data-scale="0.36">cage</button>
      <span id="place-state" class="hint">idle</span>
    </div>
    <div class="row">
      <button id="exit-app-poof" type="button">exit: app poof</button>
      <button id="exit-quick-poof" type="button">exit: quick poof</button>
      <span id="exit-state" class="hint">exit idle</span>
    </div>
    <div class="row">
      <label>orbit pop gap
        <input id="orbit-pop-gap" type="number" min="0.15" max="1.5" step="0.05" value="0.5">
        sec
      </label>
    </div>
    <div class="row">
      <button id="reset" type="button">reset</button>
      <label><input id="loop" type="checkbox"> loop</label>
    </div>
    <p>W/S pitch, Q/E yaw, wheel zoom, middle drag pan.</p>
  </div>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="/static/level_fx_lab.js"></script>
</body>
</html>
