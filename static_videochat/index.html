<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Videochat Campfire Overlay</title>
  <link rel="stylesheet" href="/shared/chat_core.css?v={{CB}}">
  <link rel="stylesheet" href="/static/style.css?v={{CB}}">
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="screen-meteor m1"></div>
  <div class="screen-meteor m2"></div>
  <div class="screen-meteor m3"></div>
  <div id="topic-title" title="더블클릭해서 제목 편집"></div>
  <textarea id="topic-editor" aria-label="방송 제목"></textarea>
  <div id="topic-resize" title="제목 크기 조절"></div>
  <div id="topic-controls">
    <button id="topic-move" type="button" title="제목 이동">M</button>
    <button id="topic-edit" type="button" title="제목 편집">T</button>
  </div>
  <div id="participants"></div>
  <div id="toast-handle" title="entry/exit message position">event</div>
  <div id="event-toasts"></div>
  <div id="avatar-controls">
    <button id="avatar-size-down" type="button" title="캐릭터 위 이름표 전체 축소">A-</button>
    <button id="avatar-size-up" type="button" title="캐릭터 위 이름표 전체 확대">A+</button>
    <button id="bubble-size-down" type="button" title="말풍선 전체 축소">B-</button>
    <button id="bubble-size-up" type="button" title="말풍선 전체 확대">B+</button>
    <label class="effect-control" title="이름표와 캐릭터 머리 사이 거리(px)">
      <span>head</span>
      <input id="avatar-head-gap" type="number" min="-80" max="160" step="2" value="0">
    </label>
    <label class="effect-control" title="말풍선과 이름표 사이 거리(px)">
      <span>talk</span>
      <input id="bubble-card-gap" type="number" min="-80" max="220" step="2" value="0">
    </label>
    <button id="subaccount-toggle" type="button" title="부계정 캐릭터 보이기/숨기기">sub hide</button>
    <button id="subaccount-auto-toggle" type="button" title="부계정 리시버 자동 입장 켜기/끄기">auto on</button>
    <button id="toast-size-down" type="button" title="entry/exit message smaller">E-</button>
    <button id="toast-size-up" type="button" title="entry/exit message larger">E+</button>
    <label class="effect-control" title="entry/exit message style">
      <span>msg</span>
      <select id="toast-style">
        <option value="ember">ember</option>
        <option value="glass">glass</option>
        <option value="label">label</option>
        <option value="signal">signal</option>
      </select>
    </label>
    <label class="effect-control message-template" title="entry message template, use {name}">
      <span>enter</span>
      <input id="entry-message-template" type="text" value="{name} 등장">
    </label>
    <label class="effect-control message-template" title="exit message template, use {name}">
      <span>leave</span>
      <input id="exit-message-template" type="text" value="{name} 안녕 다음에 또봐요">
    </label>
    <label class="effect-control message-template" title="level up message template, use {name}, {old_level}, {new_level}, {level}, {delta}">
      <span>lv+</span>
      <input id="level-up-message-template" type="text" value="{name} 레벨 업 Lv. {old_level} → {new_level}">
    </label>
    <label class="effect-control message-template" title="level down message template, use {name}, {old_level}, {new_level}, {level}, {delta}">
      <span>lv-</span>
      <input id="level-down-message-template" type="text" value="{name} 레벨 다운 Lv. {old_level} → {new_level}">
    </label>
    <label class="effect-control" title="entry effect">
      <span>in</span>
      <select id="entry-effect">
        <option value="drop">drop</option>
        <option value="walk">walk</option>
        <option value="fade">fade</option>
        <option value="none">none</option>
      </select>
    </label>
    <label class="effect-control" title="exit effect">
      <span>out</span>
      <select id="exit-effect">
        <option value="ascend">ascend</option>
        <option value="fade">fade</option>
        <option value="none">none</option>
      </select>
    </label>
    <label class="effect-control" title="debug lifecycle seconds">
      <span>cycle</span>
      <input id="lifecycle-sec" type="number" min="1" max="60" step="0.5" value="6.5">
    </label>
    <label class="effect-control" title="/fire per-user cooldown seconds">
      <span>fire U</span>
      <input id="fire-user-cooldown" type="number" min="0" max="60" step="0.5" value="3">
    </label>
    <label class="effect-control" title="/fire global cooldown seconds">
      <span>fire G</span>
      <input id="fire-global-cooldown" type="number" min="0" max="60" step="0.5" value="1">
    </label>
  </div>
  <div id="chat-panel">
    <div id="chat-controls">
      <button id="chat-drag" type="button" title="채팅창 이동">M</button>
      <button id="chat-font-down" type="button" title="글자 작게">-</button>
      <button id="chat-font-up" type="button" title="글자 크게">+</button>
      <label id="chat-fade-control" title="사라지는 시간(초), -1이면 안 사라짐">
        <span>fade</span>
        <input id="chat-fade" type="number" step="1" value="-1">
      </label>
      <button id="chat-toggle" type="button" title="채팅창 보이기/숨기기">◉</button>
    </div>
    <div id="chat-log"></div>
    <form id="chat-send-panel" hidden>
      <div id="chat-send-targets" aria-label="전송 대상">
        <button class="chat-send-target active" data-target="main" type="button">main</button>
        <button class="chat-send-target" data-target="here" type="button" disabled>here</button>
      </div>
      <div id="chat-send-body">
        <div id="chat-reply-preview" hidden>
          <span id="chat-reply-preview-label"></span>
          <button id="chat-reply-preview-clear" type="button" title="답장 취소">x</button>
        </div>
        <textarea id="chat-send-text" rows="2" maxlength="1000" placeholder="Telegram으로 보내기"></textarea>
        <div id="chat-send-preview" hidden>
          <img id="chat-send-preview-img" alt="">
          <span id="chat-send-preview-name"></span>
          <button id="chat-send-preview-clear" type="button" title="사진 제거">x</button>
        </div>
      </div>
      <label id="chat-send-file-button" title="사진 추가">
        +
        <input id="chat-send-file" type="file" accept="image/*,video/mp4,video/webm" hidden>
      </label>
      <button id="chat-send-emoji-button" type="button" title="recent sticker/custom emoji">☺</button>
      <button id="chat-send-button" type="submit" disabled>send</button>
    </form>
    <div id="chat-message-menu" hidden>
      <button id="chat-menu-reply" type="button">답장</button>
      <button id="chat-menu-quote" type="button">인용</button>
      <button id="chat-menu-delete" type="button">삭제</button>
    </div>
    <div id="chat-resize" title="채팅창 크기 조절"></div>
  </div>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script src="/shared/chat_core.js?v={{CB}}"></script>
  <script src="/static/app.js?v={{CB}}"></script>
</body>
</html>
