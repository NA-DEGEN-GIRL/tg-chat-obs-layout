<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>TG Chat Overlay</title>
  <link rel="stylesheet" href="/shared/chat_core.css?v={{CB}}">
  <link rel="stylesheet" href="/static/style.css?v={{CB}}">
</head>
<body>
  <div id="chat"></div>
  <form id="send-panel" hidden>
    <div id="chat-tools" aria-label="채팅 표시 설정">
      <button id="font-down" type="button" title="채팅 글자 작게">A-</button>
      <button id="font-up" type="button" title="채팅 글자 크게">A+</button>
      <button id="stt-mic" type="button" title="이 컴퓨터 마이크를 STT 입력으로 사용">mic</button>
    </div>
    <div id="send-targets" aria-label="전송 대상">
      <button class="send-target active" data-target="main" type="button">main</button>
      <button class="send-target" data-target="here" type="button" disabled>here</button>
    </div>
    <div id="send-body">
      <textarea id="send-text" rows="2" maxlength="1000" placeholder="Telegram으로 보내기"></textarea>
      <div id="send-preview" hidden>
        <img id="send-preview-img" alt="">
        <span id="send-preview-name"></span>
        <button id="send-preview-clear" type="button" title="사진 제거">x</button>
      </div>
    </div>
    <label id="send-file-button" title="사진 추가">
      +
      <input id="send-file" type="file" accept="image/*,video/mp4,video/webm" hidden>
    </label>
    <button id="send-emoji-button" type="button" title="recent sticker/custom emoji">☺</button>
    <button id="send-button" type="submit" disabled>send</button>
  </form>
  <div id="message-menu" hidden>
    <button id="menu-reply" type="button">답장</button>
    <button id="menu-quote" type="button">인용</button>
    <button id="menu-mini-jail" type="button">난쟁이</button>
    <button id="menu-real-jail" type="button">케이지</button>
    <button id="menu-tmute" type="button">아가리</button>
    <button id="menu-delete" type="button">삭제</button>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script src="/shared/chat_core.js?v={{CB}}"></script>
  <script src="/static/app.js?v={{CB}}"></script>
</body>
</html>
